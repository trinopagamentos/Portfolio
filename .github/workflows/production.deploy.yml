name: Deploy to Production
on:
  pull_request_review:
    types: [submitted]
  # Allow this script to be started manually
  workflow_dispatch:

env:
  SECURITY_GROUP_ID: ${{ secrets.PRD_SECURITY_GROUP_ID }}
  AWS_REGION: ${{ secrets.PRD_AWS_REGION }}
  DEPLOY_RELAY_URL: ${{ secrets.DEPLOY_RELAY_URL }}
  DEPLOY_RELAY_SHARED_SECRET: ${{ secrets.DEPLOY_RELAY_SHARED_SECRET }}

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config p/owasp-top-ten --config p/security-audit --config p/secrets --error

  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  deploy:
    name: Deploy to Production
    needs: [semgrep, gitleaks, trivy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deploy_started_at: ${{ steps.notify_start.outputs.event_timestamp }}
      release_id: ${{ steps.release.outputs.release_id }}
      healthcheck_outcome: ${{ steps.healthcheck.outcome }}
      rollback_status: ${{ steps.finalize.outputs.rollback_status }}
    steps:
    - name: Get runner public IP
      id: ip
      run: |
        # Get public IP using multiple methods for reliability
        IP=$(curl -s https://api.ipify.org || curl -s https://ifconfig.me || curl -s https://icanhazip.com)
        echo "ipv4=$IP" >> $GITHUB_OUTPUT
        echo "Runner public IP: $IP"
        
    - name: Add current runner IP to security group
      id: add-rule
      run: |
        echo "Adding current runner IP ${{ steps.ip.outputs.ipv4 }} to security group ${{ env.SECURITY_GROUP_ID }}"
        if aws ec2 authorize-security-group-ingress \
          --group-id ${{ env.SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32; then
          echo "rule-added=true" >> $GITHUB_OUTPUT
          echo "✅ Security group rule added successfully"
        else
          echo "rule-added=false" >> $GITHUB_OUTPUT
          echo "⚠️ Rule may already exist or failed to add"
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.PRD_AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.PRD_AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Test SSH connectivity
      run: |
        echo "Testing SSH connectivity from current runner..."
        echo "Current runner IP: ${{ steps.ip.outputs.ipv4 }}"
        
        # Test basic connectivity
        if timeout 15 nc -zv ${{ secrets.PRD_SFTP_SERVER }} 22; then
          echo "✅ SSH port 22 is reachable from current runner"
        else
          echo "⚠️ SSH port 22 not reachable from current runner"
        fi
    
    - name: Publish deploy started
      id: notify_start
      continue-on-error: true
      uses: ./.github/actions/clickup-deploy-notify
      with:
        relay-url: ${{ env.DEPLOY_RELAY_URL }}
        relay-shared-secret: ${{ env.DEPLOY_RELAY_SHARED_SECRET }}
        application: Portfolio
        environment: production
        event-type: deploy_started
        job-name: Deploy to Production
        stage: deploy
        target-type: php_server
        target-name: production_sftp
        workflow-pattern: scp_ssh_cleanup
        cleanup-status: pending
        rollback-status: not_applicable
        gates-json: |
          {"semgrep":"${{ needs.semgrep.result }}","gitleaks":"${{ needs.gitleaks.result }}","trivy":"${{ needs.trivy.result }}"}
        metadata-json: |
          {"notification_channel":"clickup_devops"}

    - name: Prepare release metadata
      id: release
      run: |
        TARGET_DIR="${{ secrets.PRD_SFTP_DIR }}"
        TARGET_DIR="${TARGET_DIR%/}"
        APP_NAME="$(basename "$TARGET_DIR")"
        PARENT_DIR="$(dirname "$TARGET_DIR")"
        RELEASE_ID="$(date -u +%Y%m%d%H%M%S)-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        RELEASES_DIR="$PARENT_DIR/.releases/$APP_NAME"
        RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
        SHARED_DIR="$PARENT_DIR/.shared/$APP_NAME"
        SHARED_ASSETS_DIR="$SHARED_DIR/assets"
        SHARED_IMG_DIR="$SHARED_ASSETS_DIR/img"

        echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        echo "releases_dir=$RELEASES_DIR" >> "$GITHUB_OUTPUT"
        echo "live_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
        echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
        echo "shared_dir=$SHARED_DIR" >> "$GITHUB_OUTPUT"
        echo "shared_assets_dir=$SHARED_ASSETS_DIR" >> "$GITHUB_OUTPUT"
        echo "shared_img_dir=$SHARED_IMG_DIR" >> "$GITHUB_OUTPUT"

    - name: Bootstrap release directories
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 300s
        command_timeout: 5m
        script: |
          set -eu
          TARGET_DIR="${{ steps.release.outputs.live_dir }}"
          RELEASES_DIR="${{ steps.release.outputs.releases_dir }}"
          RELEASE_DIR="${{ steps.release.outputs.release_dir }}"
          SHARED_ASSETS_DIR="${{ steps.release.outputs.shared_assets_dir }}"
          SHARED_IMG_DIR="${{ steps.release.outputs.shared_img_dir }}"

          mkdir -p "$RELEASES_DIR"
          mkdir -p "$SHARED_ASSETS_DIR"
          mkdir -p "$SHARED_IMG_DIR"
          if [ -d "$TARGET_DIR" ] && [ ! -L "$TARGET_DIR" ]; then
            LEGACY_DIR="$RELEASES_DIR/legacy-initial-$(date +%Y%m%d%H%M%S)"
            mv "$TARGET_DIR" "$LEGACY_DIR"
            ln -s "$LEGACY_DIR" "$TARGET_DIR"
          fi
          CURRENT_TARGET=""
          if [ -L "$TARGET_DIR" ]; then
            CURRENT_TARGET="$(readlink -f "$TARGET_DIR")"
            printf '%s' "$CURRENT_TARGET" > "$RELEASES_DIR/.previous_target"
          fi
          SOURCE_IMG_DIR=""
          if [ -n "$CURRENT_TARGET" ] && [ -e "$CURRENT_TARGET/assets/img" ]; then
            CURRENT_IMG_DIR="$(readlink -f "$CURRENT_TARGET/assets/img")"
            if [ "$CURRENT_IMG_DIR" != "$SHARED_IMG_DIR" ] && [ -d "$CURRENT_IMG_DIR" ]; then
              SOURCE_IMG_DIR="$CURRENT_IMG_DIR"
            fi
          fi
          if [ -z "$SOURCE_IMG_DIR" ]; then
            for CANDIDATE in "$RELEASES_DIR"/legacy-initial-* "$RELEASES_DIR"/*; do
              if [ ! -e "$CANDIDATE" ] || [ "$CANDIDATE" = "$RELEASE_DIR" ] || [ ! -e "$CANDIDATE/assets/img" ]; then
                continue
              fi
              CANDIDATE_IMG_DIR="$(readlink -f "$CANDIDATE/assets/img")"
              if [ "$CANDIDATE_IMG_DIR" != "$SHARED_IMG_DIR" ] && [ -d "$CANDIDATE_IMG_DIR" ]; then
                SOURCE_IMG_DIR="$CANDIDATE_IMG_DIR"
                break
              fi
            done
          fi
          if [ -n "$SOURCE_IMG_DIR" ]; then
            cp -an "$SOURCE_IMG_DIR/." "$SHARED_IMG_DIR/"
          fi
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        source: "./, !.editorconfig, !.env-sample, !.gitignore, !README.md"
        target: ${{ steps.release.outputs.release_dir }}
        timeout: 300s
        command_timeout: 10m
    
    - name: Promote release
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 300s
        command_timeout: 5m
        script: |
          set -eu
          TARGET_DIR="${{ steps.release.outputs.live_dir }}"
          RELEASES_DIR="${{ steps.release.outputs.releases_dir }}"
          RELEASE_DIR="${{ steps.release.outputs.release_dir }}"
          SHARED_IMG_DIR="${{ steps.release.outputs.shared_img_dir }}"
          if [ -L "$TARGET_DIR" ]; then
            readlink -f "$TARGET_DIR" > "$RELEASES_DIR/.previous_target"
          fi
          mkdir -p "$SHARED_IMG_DIR"
          mkdir -p "$RELEASE_DIR/assets"
          if [ -d "$RELEASE_DIR/assets/img" ]; then
            cp -af "$RELEASE_DIR/assets/img/." "$SHARED_IMG_DIR/"
            rm -rf "$RELEASE_DIR/assets/img"
          fi
          ln -sfn "$SHARED_IMG_DIR" "$RELEASE_DIR/assets/img"
          ln -sfn "$RELEASE_DIR" "${TARGET_DIR}.next"
          mv -Tf "${TARGET_DIR}.next" "$TARGET_DIR"
          echo "✅ Release promoted: $RELEASE_DIR"

    - name: Write deploy metadata
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 60s
        command_timeout: 1m
        script: |
          cat > "${{ steps.release.outputs.release_dir }}/_deploy_meta.json" <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "short_sha": "$(echo '${{ github.sha }}' | cut -c1-7)",
            "ref": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

    - name: Invalidate OPcache and realpath cache
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 60s
        command_timeout: 2m
        script: |
          set -eu
          RELEASE_DIR="${{ steps.release.outputs.release_dir }}"
          RESET_FILE="$RELEASE_DIR/_opcache_reset_${{ github.run_id }}.php"

          cat > "$RESET_FILE" <<'EOPHP'
          <?php
          if (function_exists('opcache_reset')) { opcache_reset(); }
          clearstatcache(true);
          header('Content-Type: text/plain');
          echo 'OK';
          EOPHP

          for i in 1 2 3 4 5; do
            curl --silent --max-time 5 \
              -H "Host: portfolio.trinopagamentos.com" \
              -H "X-Forwarded-For: 52.72.228.239" \
              "http://127.0.0.1/_opcache_reset_${{ github.run_id }}.php" || true
            sleep 0.2
          done

          rm -f "$RESET_FILE"
          echo "✅ OPcache and realpath cache invalidated"

    - name: Post-deploy smoke check
      id: healthcheck
      if: always()
      continue-on-error: true
      run: |
        curl --silent --show-error --fail --location --max-time 20 "https://portfolio.trinopagamentos.com/" >/dev/null
        echo "✅ Portfolio smoke check passed"

    - name: Rollback release if smoke check fails
      id: rollback
      if: always() && steps.healthcheck.outcome == 'failure'
      continue-on-error: true
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 300s
        command_timeout: 5m
        script: |
          set -eu
          TARGET_DIR="${{ steps.release.outputs.live_dir }}"
          RELEASES_DIR="${{ steps.release.outputs.releases_dir }}"
          PREVIOUS_TARGET="$(cat "$RELEASES_DIR/.previous_target" 2>/dev/null || true)"
          if [ -z "$PREVIOUS_TARGET" ] || [ ! -e "$PREVIOUS_TARGET" ]; then
            echo "Previous release target is invalid: $PREVIOUS_TARGET"
            exit 1
          fi
          ln -sfn "$PREVIOUS_TARGET" "${TARGET_DIR}.rollback"
          mv -Tf "${TARGET_DIR}.rollback" "$TARGET_DIR"
          echo "✅ Rollback restored previous release: $PREVIOUS_TARGET"

    - name: Cleanup old releases
      if: always()
      continue-on-error: true
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 60s
        command_timeout: 2m
        script: |
          set -eu
          RELEASES_DIR="${{ steps.release.outputs.releases_dir }}"
          if [ -d "$RELEASES_DIR" ]; then
            ls -1dt "$RELEASES_DIR"/* 2>/dev/null | awk "NR>5" | xargs -r rm -rf
          fi

    - name: Clean sensitive files and folders
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRD_SFTP_SERVER }}
        username: ${{ secrets.PRD_SFTP_USER }}
        key: ${{ secrets.PRD_SFTP_SSH_PRIVATE_KEY }}
        timeout: 300s
        command_timeout: 10m
        script: |
          cd "${{ steps.release.outputs.release_dir }}"
          
          echo "Starting cleanup process..."
          
          # Remove git folders and files
          echo "Removing git-related folders..."
          rm -rf .git
          rm -rf .github
          rm -rf .vscode
          rm -rf .docker
          
          # Remove DS_Store files (recursively)
          echo "Removing .DS_Store files..."
          find . -name ".DS_Store" -type f -delete 2>/dev/null || true
          
          # Remove environment files
          echo "Removing environment files..."
          rm -f .env
          rm -f .env.local
          rm -f .env.development
          rm -f .env.production
          rm -f .env.staging
          
          # Remove development files
          echo "Removing development files..."
          rm -f .gitignore
          rm -f .editorconfig
          rm -f README.md
          rm -f docker-compose.yml
          rm -f Dockerfile
          rm -f .dockerignore
          
          # Remove package files that might contain sensitive info
          echo "Removing package files..."
          rm -f package-lock.json
          rm -f yarn.lock
          rm -f composer.lock
          
          # Remove common development folders
          echo "Removing development folders..."
          rm -rf node_modules 2>/dev/null || true
          rm -rf vendor/bin 2>/dev/null || true
          rm -rf tests 2>/dev/null || true
          rm -rf test 2>/dev/null || true
          
          echo "✅ Cleanup completed successfully"
          
          # Show final directory structure (optional, comment out if too verbose)
          echo "Final directory structure:"
          ls -la
        
    - name: Remove current runner IP from security group
      run: |
        echo "Removing current runner IP ${{ steps.ip.outputs.ipv4 }} from security group ${{ env.SECURITY_GROUP_ID }}"
        if aws ec2 revoke-security-group-ingress \
          --group-id ${{ env.SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32; then
          echo "✅ Security group rule removed successfully"
        else
          echo "⚠️ Rule may not exist or already removed"
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.PRD_AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.PRD_AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      if: always() && steps.add-rule.outputs.rule-added == 'true'

    - name: Finalize deployment result
      id: finalize
      if: always()
      run: |
        rollback_status="not_applicable"
        if [ "${{ steps.healthcheck.outcome }}" = "failure" ]; then
          echo "❌ Post-deploy smoke check failed"
          if [ "${{ steps.rollback.outcome }}" = "success" ]; then
            rollback_status="success"
          elif [ "${{ steps.rollback.outcome }}" = "failure" ]; then
            rollback_status="failed"
          fi
          echo "rollback_status=$rollback_status" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        echo "rollback_status=$rollback_status" >> "$GITHUB_OUTPUT"
        echo "✅ Deploy flow completed successfully"

  notify:
    name: Deployment Notification
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    steps:
    - name: Deployment status
      run: |
        if [ "${{ needs.deploy.result }}" = "success" ]; then
          echo "✅ Production deployment completed successfully!"
          echo "Deploy: ${{ needs.deploy.result }}"
        else
          echo "❌ Production deployment failed!"
          echo "Deploy: ${{ needs.deploy.result }}"
          exit 1
        fi

  notify_clickup:
    name: ClickUp Deploy Notification
    needs: [semgrep, gitleaks, trivy, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && needs.deploy.result != 'skipped'
    steps:
      - uses: actions/checkout@v4
      - name: Publish deploy finished
        continue-on-error: true
        uses: ./.github/actions/clickup-deploy-notify
        with:
          relay-url: ${{ env.DEPLOY_RELAY_URL }}
          relay-shared-secret: ${{ env.DEPLOY_RELAY_SHARED_SECRET }}
          application: Portfolio
          environment: production
          event-type: deploy_finished
          job-result: ${{ needs.deploy.result }}
          job-name: ClickUp Deploy Notification
          stage: deploy
          target-type: php_server
          target-name: production_sftp
          workflow-pattern: scp_ssh_cleanup
          cleanup-status: completed_or_best_effort
          rollback-status: not_applicable
          started-at: ${{ needs.deploy.outputs.deploy_started_at }}
          gates-json: |
            {"semgrep":"${{ needs.semgrep.result }}","gitleaks":"${{ needs.gitleaks.result }}","trivy":"${{ needs.trivy.result }}","post_deploy_smoke_check":"${{ needs.deploy.outputs.healthcheck_outcome }}","deploy":"${{ needs.deploy.result }}"}
          metadata-json: |
            {"notification_channel":"clickup_devops","release_id":"${{ needs.deploy.outputs.release_id }}","post_deploy_check_name":"Portfolio public smoke check","post_deploy_check_url":"https://portfolio.trinopagamentos.com/","post_deploy_check_result":"${{ needs.deploy.outputs.healthcheck_outcome }}"}
      - name: Notification summary
        run: |
          echo "Deploy result: ${{ needs.deploy.result }}"
